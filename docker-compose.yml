version: '3.9'

services:
  # NestJS API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: npm run start:prod
    ports:
      - '${PORT:-5555}:5555'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-net
    volumes:
      - ./src:/usr/src/app/src:cached 
      - ./tsconfig.json:/usr/src/app/tsconfig.json:ro

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-net
    restart: unless-stopped

# Networks
networks:
  app-net:
    driver: bridge

# Volumes
volumes:
  redis-data:
